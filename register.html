<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kurumsal Kayıt – KönigBoard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  font-family:Poppins,system-ui;
  background:#0d0d0d;
  color:#fff;
  margin:0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}
.box{
  background:#141414;
  padding:40px;
  border-radius:16px;
  width:100%;
  max-width:560px;
  box-shadow:0 0 30px rgba(0,0,0,.4);
}
h1{color:#cc0000;text-align:center;margin-bottom:25px}
label{display:block;margin-top:14px;color:#ccc;font-size:14px}
input{
  width:100%;
  padding:12px;
  border-radius:8px;
  border:none;
  background:#1f1f1f;
  color:#fff;
  margin-top:6px;
  font-size:15px;
}
button{
  width:100%;
  margin-top:26px;
  padding:14px;
  background:#cc0000;
  border:none;
  border-radius:10px;
  color:#fff;
  font-weight:600;
  font-size:16px;
  cursor:pointer;
}
button:hover{background:#a80000}
.msg{margin-top:16px;text-align:center;font-size:14px}
.error{color:#ff6b6b}
.success{color:#4caf50}
.small{text-align:center;color:#aaa;font-size:13px;margin-top:18px}
</style>
</head>
<body>

<div class="box">
  <h1>Kurumsal Kayıt</h1>

  <form id="registerForm">
    <label>Şirket Adı</label>
    <input id="companyName" required>

    <label>Yetkili Kişi</label>
    <input id="authorized" required>

    <label>E-posta</label>
    <input id="email" type="email" required>

    <label>Telefon</label>
    <input id="phone" placeholder="05xx xxx xx xx" required>

    <label>Şifre</label>
    <input id="password" type="password" required>

    <button type="submit">Kayıt Ol</button>
  </form>

  <div id="msg" class="msg"></div>

  <div class="small">
    Zaten hesabın var mı? <a href="login.html" style="color:#cc0000">Giriş Yap</a>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, sendEmailVerification } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-auth.js";
import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyChTIs-88nIFeSsVuF2aMFJigwITWb3lbU",
  authDomain: "konigboard.firebaseapp.com",
  projectId: "konigboard",
  storageBucket: "konigboard.firebasestorage.app",
  messagingSenderId: "542862934182",
  appId: "1:542862934182:web:927ee1271cb5430fd4b467"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const form = document.getElementById("registerForm");
const msg = document.getElementById("msg");

function cleanPhone(p){
  return p.replace(/\D/g,""); // boşluk, tire, parantez vs temizler
}

form.addEventListener("submit", async (e)=>{
  e.preventDefault();
  msg.innerHTML = "";

  const company = document.getElementById("companyName").value.trim();
  const authorized = document.getElementById("authorized").value.trim();
  const email = document.getElementById("email").value.trim();
  const phoneRaw = document.getElementById("phone").value;
  const password = document.getElementById("password").value;

  const phone = cleanPhone(phoneRaw);

  if(phone.length < 10){
    msg.innerHTML = `<div class="error">❌ Telefon numarası geçersiz</div>`;
    return;
  }

  try{
    const cred = await createUserWithEmailAndPassword(auth, email, password);

    await sendEmailVerification(cred.user);

    await setDoc(doc(db,"users",cred.user.uid),{
      uid: cred.user.uid,
      companyName: company,
      authorized,
      email,
      phone,
      type: "company",
      plan: "none",
      status: "pending",
      createdAt: serverTimestamp()
    });

    msg.innerHTML = `<div class="success">
      ✅ Kayıt başarılı<br>
      📩 E-posta doğrulama gönderildi
    </div>`;

    form.reset();

  }catch(err){
    msg.innerHTML = `<div class="error">❌ ${err.message}</div>`;
  }
});
</script>

</body>
</html>
