<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>KönigBoard | Kurumsal Kayıt</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  font-family:Poppins,sans-serif;
  background:#0d0d0d;
  color:#fff;
  margin:0;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}
.box{
  background:#141414;
  padding:40px;
  border-radius:16px;
  width:100%;
  max-width:420px;
}
h1{color:#cc0000;text-align:center;margin-bottom:25px}
input{
  width:100%;
  padding:12px;
  margin-bottom:14px;
  border-radius:8px;
  border:none;
  background:#1f1f1f;
  color:#fff;
}
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:#cc0000;
  color:#fff;
  font-weight:600;
  cursor:pointer;
}
button:hover{background:#a80000}
small{display:block;text-align:center;margin-top:15px;color:#aaa}
</style>
</head>

<body>

<div class="box">
  <h1>Kurumsal Kayıt</h1>

  <input id="companyName" placeholder="Şirket Adı">
  <input id="authorized" placeholder="Yetkili Kişi">
  <input id="phone" placeholder="Telefon (+90...)">
  <input id="email" type="email" placeholder="E-posta">
  <input id="password" type="password" placeholder="Şifre (en az 6 karakter)">

  <button id="registerBtn">Kayıt Ol</button>

  <small>Zaten hesabın var mı? <a href="login.html" style="color:#cc0000">Giriş Yap</a></small>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js";
import { 
  getAuth, 
  createUserWithEmailAndPassword, 
  sendEmailVerification 
} from "https://www.gstatic.com/firebasejs/10.11.1/firebase-auth.js";
import { 
  getFirestore, 
  doc, 
  setDoc, 
  serverTimestamp 
} from "https://www.gstatic.com/firebasejs/10.11.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyChTIs-88nIFeSsVuF2aMFJigwITWb3lbU",
  authDomain: "konigboard.firebaseapp.com",
  projectId: "konigboard",
  storageBucket: "konigboard.firebasestorage.app",
  messagingSenderId: "542862934182",
  appId: "1:542862934182:web:927ee1271cb5430fd4b467"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

document.getElementById("registerBtn").onclick = async () => {
  const companyName = document.getElementById("companyName").value.trim();
  const authorized = document.getElementById("authorized").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  if(!companyName || !authorized || !phone || !email || !password){
    alert("Tüm alanları doldur");
    return;
  }

  try{
    const cred = await createUserWithEmailAndPassword(auth, email, password);

    await setDoc(doc(db, "users", cred.user.uid), {
      companyName,
      authorized,
      phone,
      email,
      plan: "none",
      status: "pending",
      createdAt: serverTimestamp()
    });

    await sendEmailVerification(cred.user);

    alert("✅ Kayıt başarılı!\nE-postanı doğrula.");
    window.location.href = "login.html";

  }catch(err){
    alert("❌ Hata: " + err.message);
  }
};
</script>

</body>
</html>
