<!DOCTYPE html>
<html lang="tr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Email Doğrulama</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
background:#0d0d0d;
font-family:Poppins;
color:#fff;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
text-align:center;
}

.box{
background:#141414;
padding:40px;
border-radius:16px;
max-width:420px;
}

h2{
color:#cc0000;
}

button{
margin-top:25px;
padding:12px 20px;
background:#cc0000;
border:none;
color:#fff;
border-radius:8px;
cursor:pointer;
font-weight:600;
}

button:hover{
background:#a80000;
}

</style>

</head>

<body>

<div class="box">

<h2>Email Gönderildi</h2>

<p>
E-postanıza doğrulama linki gönderdik.
<br><br>
Maili onayladıktan sonra aşağıdaki butona basın.
</p>

<button id="continueBtn">
Maili Doğruladım
</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js";
import { getAuth } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyChTIs-88nIFeSsVuF2aMFJigwITWb3lbU",
authDomain: "konigboard.firebaseapp.com",
projectId: "konigboard",
storageBucket: "konigboard.firebasestorage.app",
messagingSenderId: "542862934182",
appId: "1:542862934182:web:927ee1271cb5430fd4b467"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

document.getElementById("continueBtn").onclick = async ()=>{

const user = auth.currentUser;

await user.reload();

if(user.emailVerified){

window.location.href="pricing.html";

}else{

alert("Mail henüz doğrulanmamış.");

}

};

</script>

</body>
</html>
