<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Giriş Yap | KönigBoard</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyChTIs-88nIFeSsVuF2aMFJigwITWb3lbU",
      authDomain: "konigboard.firebaseapp.com",
      projectId: "konigboard",
      storageBucket: "konigboard.firebasestorage.app",
      messagingSenderId: "542862934182",
      appId: "1:542862934182:web:927ee1271cb5430fd4b467",
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    document.addEventListener("DOMContentLoaded", () => {
      const form = document.getElementById("loginForm");
      const msg = document.getElementById("message");
      const resetBtn = document.getElementById("resetBtn");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value.trim();

        msg.innerText = "⏳ Giriş yapılıyor...";

        try {
          const userCredential = await signInWithEmailAndPassword(auth, email, password);
          const user = userCredential.user;

          // 🔒 E-posta doğrulanmış mı kontrolü
          if (!user.emailVerified) {
            msg.innerText = "📧 Lütfen önce e-posta adresini doğrula.";
            return;
          }

          msg.innerText = "✅ Giriş başarılı! Yönlendiriliyor...";
          setTimeout(() => {
            window.location.href = "pricing.html";
          }, 1500);

        } catch (error) {
          console.error(error);
          let m = "❌ Giriş başarısız.";
          if (error.code === "auth/invalid-credential" || error.code === "auth/wrong-password") m = "❌ E-posta veya şifre hatalı.";
          if (error.code === "auth/user-not-found") m = "🚫 Bu e-posta adresiyle kayıt bulunamadı.";
          msg.innerText = m;
        }
      });

      // Şifremi unuttum
      resetBtn.addEventListener("click", async () => {
        const email = prompt("Şifreni sıfırlamak için e-posta adresini gir:");
        if (!email) return;
        try {
          await sendPasswordResetEmail(auth, email);
          alert("📩 Şifre sıfırlama linki e-postana gönderildi.");
        } catch (error) {
          alert("Hata: " + error.message);
        }
      });
    });
  </script>

  <style>
    body {
      background: radial-gradient(circle at top left, #cc0000, #0d0d0d);
      color: #fff;
      font-family: 'Poppins', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .login-container {
      background: rgba(20,20,20,0.9);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 0 25px rgba(0,0,0,0.5);
      width: 360px;
      text-align: center;
    }
    h1 { color:#cc0000; margin-bottom:30px; font-size:26px; }
    label { display:block; text-align:left; margin-bottom:6px; color:#ddd; font-weight:500; font-size:14px; }
    input {
      width:100%; padding:12px; margin-bottom:16px; border:none; border-radius:8px;
      background:#1f1f1f; color:#fff; font-size:14px; outline:none;
    }
    input:focus { border:1px solid #cc0000; }
    button {
      width:100%; background:#cc0000; color:#fff; border:none; padding:12px;
      border-radius:8px; font-weight:600; cursor:pointer; transition:0.3s;
    }
    button:hover { background:#a80000; }
    .message { margin-top:15px; font-size:14px; color:#ccc; }
    .footer { margin-top:20px; font-size:13px; color:#999; }
    .footer a { color:#cc0000; text-decoration:none; font-weight:500; }
  </style>
</head>

<body>
  <div class="login-container">
    <h1>Giriş Yap</h1>
    <form id="loginForm">
      <label for="email">E-posta</label>
      <input type="email" id="email" placeholder="E-posta adresi" required>

      <label for="password">Şifre</label>
      <input type="password" id="password" placeholder="Şifre" required>

      <button type="submit">Giriş Yap</button>
      <p id="message" class="message"></p>
    </form>

    <div class="footer">
      <a href="#" id="resetBtn">Şifremi unuttum</a> <br>
      Hesabın yok mu? <a href="register.html">Kayıt ol</a>
    </div>
  </div>
</body>
</html>
