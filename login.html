<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>KönigBoard – Giriş Yap</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --red: #cc0000;
      --dark: #0b0b0b;
      --gray: #1a1a1a;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{
      font-family:'Poppins',sans-serif;
      background:linear-gradient(135deg,#0a0a0a,#1a1a1a);
      color:#fff;
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
    }
    .login-container{
      width:100%;
      max-width:400px;
      background:rgba(255,255,255,0.05);
      padding:40px 35px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,0.1);
      box-shadow:0 8px 30px rgba(0,0,0,0.4);
      text-align:center;
      backdrop-filter:blur(10px);
      animation:fadeIn .6s ease;
    }
    @keyframes fadeIn{
      from{opacity:0;transform:translateY(20px);}
      to{opacity:1;transform:translateY(0);}
    }
    .logo{
      width:130px;
      margin-bottom:20px;
    }
    h1{
      font-size:24px;
      color:var(--red);
      margin-bottom:30px;
      letter-spacing:1px;
    }
    label{
      display:block;
      text-align:left;
      margin-bottom:6px;
      font-weight:600;
      color:#ccc;
      font-size:14px;
    }
    input{
      width:100%;
      padding:12px;
      margin-bottom:16px;
      border:none;
      border-radius:10px;
      background:rgba(255,255,255,0.08);
      color:#fff;
      font-size:15px;
    }
    input:focus{
      outline:2px solid var(--red);
    }
    .actions{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:16px;
      font-size:13px;
    }
    .actions label{
      display:flex;
      align-items:center;
      gap:6px;
      margin:0;
      cursor:pointer;
    }
    .actions a{
      color:var(--red);
      text-decoration:none;
    }
    button{
      width:100%;
      padding:12px;
      background:var(--red);
      color:#fff;
      border:none;
      border-radius:10px;
      font-weight:600;
      font-size:15px;
      cursor:pointer;
      transition:0.3s;
    }
    button:hover{background:#a80000;}
    .error-msg{
      color:#ff5555;
      background:rgba(255,0,0,0.1);
      border:1px solid rgba(255,0,0,0.2);
      padding:8px;
      border-radius:8px;
      margin-top:12px;
      display:none;
      animation:shake 0.4s ease;
    }
    @keyframes shake{
      0%,100%{transform:translateX(0);}
      25%{transform:translateX(-6px);}
      75%{transform:translateX(6px);}
    }
    footer{
      position:fixed;
      bottom:10px;
      text-align:center;
      width:100%;
      font-size:12px;
      color:#777;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <img src="https://i.hizliresim.com/joy286z.png" class="logo" alt="KönigBoard Logo" />
    <h1>Panele Giriş Yap</h1>

    <form id="loginForm">
      <label for="email">E-posta</label>
      <input type="email" id="email" placeholder="ornek@firma.com" required />

      <label for="password">Şifre</label>
      <input type="password" id="password" placeholder="********" required />

      <div class="actions">
        <label><input type="checkbox" id="remember" /> Beni Hatırla</label>
        <a href="#">Şifremi Unuttum</a>
      </div>

      <button type="submit">Giriş Yap</button>
      <div class="error-msg" id="errorMsg">⚠️ Hatalı e-posta veya şifre</div>
    </form>
  </div>

  <footer>© 2026 König Technologies • Güvenli Giriş Sistemi</footer>

  <script>
    document.addEventListener("DOMContentLoaded", ()=>{
      const form=document.getElementById("loginForm");
      const error=document.getElementById("errorMsg");
      const emailInput=document.getElementById("email");
      const passInput=document.getElementById("password");

      // local demo user (kayıt sayfası kaydetmiş olabilir)
      const user=JSON.parse(localStorage.getItem("registeredUser") || "{}");

      // remember logic
      const remembered=localStorage.getItem("rememberedUser");
      if(remembered){
        emailInput.value=remembered;
        document.getElementById("remember").checked=true;
      }

      form.addEventListener("submit",(e)=>{
        e.preventDefault();
        const email=emailInput.value.trim();
        const pass=passInput.value.trim();

        if(email===user.email && pass===user.password){
          error.style.display="none";
          if(document.getElementById("remember").checked){
            localStorage.setItem("rememberedUser",email);
          } else {
            localStorage.removeItem("rememberedUser");
          }
          localStorage.setItem("isLoggedIn","true");
          // giriş başarılı
          alert("✅ Giriş başarılı! Panele yönlendiriliyorsunuz...");
          window.location.href="dashboard.html";
        } else {
          error.style.display="block";
        }
      });
    });
  </script>

</body>
</html>
