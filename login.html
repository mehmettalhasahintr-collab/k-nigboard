<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KönigBoard | Giriş</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Poppins,system-ui;
  background:radial-gradient(circle at top,#cc0000,#0d0d0d 60%);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}
.box{
  width:380px;
  background:#111;
  padding:32px;
  border-radius:16px;
  box-shadow:0 0 40px rgba(0,0,0,.6);
}
h1{
  text-align:center;
  color:#cc0000;
  margin-bottom:10px;
}
p{
  text-align:center;
  color:#aaa;
  font-size:14px;
  margin-bottom:30px;
}
input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  background:#1a1a1a;
  color:#fff;
  margin-bottom:14px;
  font-size:15px;
}
input:focus{
  outline:2px solid #cc0000;
}
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:#cc0000;
  color:#fff;
  font-weight:600;
  font-size:16px;
  cursor:pointer;
}
button:hover{ background:#a80000 }
.link{
  margin-top:14px;
  text-align:center;
  font-size:14px;
}
.link a{
  color:#cc0000;
  text-decoration:none;
  cursor:pointer;
}
.error{
  margin-top:10px;
  color:#ff6b6b;
  font-size:14px;
  text-align:center;
  min-height:18px;
}
</style>
</head>
<body>

<div class="box">
  <h1>KönigBoard</h1>
  <p>Yönetim sistemine giriş yap</p>

  <input id="email" type="email" placeholder="E-posta">
  <input id="password" type="password" placeholder="Şifre">

  <button id="loginBtn">Giriş Yap</button>

  <div class="link">
    <a id="resetBtn">Şifremi Unuttum</a>
  </div>

  <div class="error" id="errorBox"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail } 
  from "https://www.gstatic.com/firebasejs/10.11.1/firebase-auth.js";
import { getFirestore, doc, getDoc } 
  from "https://www.gstatic.com/firebasejs/10.11.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyChTIs-88nIFeSsVuF2aMFJigwITWb3lbU",
  authDomain: "konigboard.firebaseapp.com",
  projectId: "konigboard",
  storageBucket: "konigboard.firebasestorage.app",
  messagingSenderId: "542862934182",
  appId: "1:542862934182:web:927ee1271cb5430fd4b467",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const emailEl = document.getElementById("email");
const passEl = document.getElementById("password");
const errorBox = document.getElementById("errorBox");

/* LOGIN */
document.getElementById("loginBtn").onclick = async () => {
  errorBox.textContent = "";

  const email = emailEl.value.trim();
  const password = passEl.value;

  if(!email || !password){
    errorBox.textContent = "E-posta ve şifre girin.";
    return;
  }

  try{
    const cred = await signInWithEmailAndPassword(auth, email, password);
    const userAuth = cred.user;

    await userAuth.reload();

if(!userAuth.emailVerified){
  errorBox.textContent = "Lütfen önce mailinizi doğrulayın.";
  return;
}

    // Firestore kaydını al
    const snap = await getDoc(doc(db,"users", userAuth.uid));

    if(!snap.exists()){
  errorBox.textContent = "Kullanıcı verisi oluşturulmamış.";
  return;
}

    const user = snap.data();

    // Hesap aktif mi?
    if(user.status !== "active"){
      errorBox.textContent = "Hesabınız henüz aktif edilmemiş.";
      return;
    }

    // Abonelik kontrolü
    if(user.subscription && user.subscription.active === true){
      window.location.href = "https://konigboardyonetici.vercel.app";
    } else {
      window.location.href = "pricing.html";
    }

  }catch(err){
    errorBox.textContent = "Giriş başarısız. Bilgileri kontrol edin.";
  }
};

/* ŞİFREMİ UNUTTUM */
document.getElementById("resetBtn").onclick = async () => {
  const email = emailEl.value.trim();
  if(!email){
    errorBox.textContent = "Önce e-posta girin.";
    return;
  }
  try{
    await sendPasswordResetEmail(auth,email,{
  url:"https://www.konigboard.com/login.html"
});
    errorBox.textContent = "Şifre sıfırlama e-postası gönderildi.";
  }catch(err){
    errorBox.textContent = "Mail gönderilemedi.";
  }
};
</script>

</body>
</html>
