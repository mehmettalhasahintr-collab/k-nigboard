<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KönigBoard | Ödeme</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Poppins;
  background:#0b0b0b;
  color:#fff;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:60px 8%;
  display:grid;
  grid-template-columns:1.2fr 1fr;
  gap:40px;
}

.card{
  background:#141414;
  border:1px solid #222;
  border-radius:18px;
  padding:30px;
}

h1{
  color:#cc0000;
  margin-bottom:20px;
}

.sub{ color:#aaa; margin-bottom:30px; }

.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

input{
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border-radius:10px;
  border:none;
  background:#1b1b1b;
  color:#fff;
}

input:focus{ outline:2px solid #cc0000; }

.taksit{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:15px;
}

.taksit button{
  padding:10px 14px;
  border-radius:10px;
  border:1px solid #333;
  background:#1b1b1b;
  color:#aaa;
  cursor:pointer;
}

.taksit button.active{
  background:#cc0000;
  color:#fff;
  border:none;
}

.summary{ position:sticky; top:40px; }

.big-price{
  font-size:34px;
  font-weight:700;
}

.small{ color:#aaa; margin-bottom:20px; }

.pay-btn{
  width:100%;
  margin-top:20px;
  padding:14px;
  background:#cc0000;
  border:none;
  border-radius:12px;
  color:#fff;
  font-weight:700;
  cursor:pointer;
}

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.85);
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
}

.loader{
  width:60px;
  height:60px;
  border:4px solid #333;
  border-top:4px solid #cc0000;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{ 100%{transform:rotate(360deg);} }

.status{ margin-top:20px; font-size:18px; }
</style>
</head>

<body>

<div class="container">

  <div class="card">
    <h1>Ödeme Bilgileri</h1>
    <div class="sub">Simülasyon ödeme sistemi</div>

    <input id="cardName" placeholder="Kart Üzerindeki İsim">
    <input id="cardNumber" placeholder="Kart Numarası">
    
    <div class="row">
      <input id="exp" placeholder="AA/YY">
      <input id="cvv" placeholder="CVV">
    </div>

    <div class="sub">Taksit</div>
    <div class="taksit" id="installments"></div>

    <button class="pay-btn" onclick="pay()">
      Ödemeyi Tamamla
    </button>

  </div>

  <div class="card summary">
    <h1>Özet</h1>

    <div id="planName" class="small"></div>
    <div class="big-price" id="price"></div>
    <div class="small" id="billing"></div>
    <div class="small" id="installmentInfo"></div>

  </div>

</div>

<div class="overlay" id="overlay">
  <div class="loader"></div>
  <div class="status" id="status">İşlem başlıyor...</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js";
import { getAuth } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-auth.js";
import { getFirestore, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyChTIs-88nIFeSsVuF2aMFJigwITWb3lbU",
  authDomain: "konigboard.firebaseapp.com",
  projectId: "konigboard",
  storageBucket: "konigboard.firebasestorage.app",
  messagingSenderId: "542862934182",
  appId: "1:542862934182:web:927ee1271cb5430fd4b467"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const data = JSON.parse(localStorage.getItem("selectedPlan"));

const prices = {
  baslangic: 4999,
  profesyonel: 11999,
  kurumsal: 24999
};

let installment = 1;

function calcPrice(){
  let base = prices[data.plan];
  return data.billing === "yearly" ? base * 10 : base;
}

function updateUI(){
  document.getElementById("planName").innerText = data.plan.toUpperCase();
  document.getElementById("price").innerText = "₺" + calcPrice().toLocaleString("tr-TR");
  document.getElementById("billing").innerText =
    data.billing === "monthly" ? "Aylık" : "Yıllık";

  document.getElementById("installmentInfo").innerText =
    data.billing === "yearly" ? installment + " taksit" : "Tek çekim";
}

function renderInstallments(){
  const box = document.getElementById("installments");
  box.innerHTML = "";

  const options = data.billing === "yearly" ? [1,2,3,6] : [1];

  options.forEach(n=>{
    const btn = document.createElement("button");
    btn.innerText = n === 1 ? "Tek Çekim" : n + " Taksit";

    if(n === installment) btn.classList.add("active");

    btn.onclick = ()=>{
      installment = n;
      renderInstallments();
      updateUI();
    };

    box.appendChild(btn);
  });
}

window.pay = async () => {

  const user = auth.currentUser;

  if(!user){
    alert("Giriş gerekli");
    return;
  }

  document.getElementById("overlay").style.display = "flex";

  const steps = [
    "Kart doğrulanıyor...",
    "Bankaya bağlanılıyor...",
    "3D Secure kontrol...",
    "Ödeme onaylanıyor...",
    "Abonelik oluşturuluyor..."
  ];

  let i = 0;

  const interval = setInterval(()=>{

    document.getElementById("status").innerText = steps[i];
    i++;

    if(i === steps.length){
      clearInterval(interval);

      setTimeout(async ()=>{

        await updateDoc(doc(db,"users",user.uid),{
          subscription:{
            active:true,
            plan:data.plan,
            billing:data.billing,
            installment:installment,
            startedAt:Date.now(),
            expiresAt:
              data.billing === "yearly"
              ? Date.now() + (10 * 30 * 24 * 60 * 60 * 1000)
              : Date.now() + (30 * 24 * 60 * 60 * 1000)
          }
        });

        document.getElementById("status").innerText = "Ödeme başarılı ✔";

        setTimeout(()=>{
          window.location.href = "https://konigboardyonetici.vercel.app";
        },1500);

      },800);
    }

  },1000);
};

renderInstallments();
updateUI();

</script>

</body>
</html>
